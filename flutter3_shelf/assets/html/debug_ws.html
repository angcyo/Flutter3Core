<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>{{deviceName}} WebSocket 日志服务 - Debug</title>
    <style>
        :root {
            --bg: #fafcff;
            --panel: rgba(255, 255, 255, 0.98);
            --line: rgba(32, 44, 75, 0.12);
            --text: #182033;
            --sub: #5f6f8d;
            --accent: #3d7eff;
            --accent-soft: rgba(61, 126, 255, 0.14);
            --ok: #2fb84a;
            --shadow: 0 14px 40px rgba(36, 58, 111, 0.12);
            --radius: 16px;
        }

        * {
            box-sizing: border-box;
        }

        a,
        button,
        input,
        label {
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            color: var(--text);
            background: linear-gradient(180deg, #ffffff 0%, var(--bg) 100%);
            min-height: 100dvh;
            padding: 6px;
        }

        .shell {
            width: 100%;
            height: calc(100dvh - 12px);
            border-radius: var(--radius);
            border: 1px solid var(--line);
            background: var(--panel);
            backdrop-filter: blur(10px);
            box-shadow: var(--shadow);
            overflow: hidden;
            padding: 12px 14px 14px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .top-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            flex-wrap: wrap;
        }

        .title-wrap {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            min-width: 0;
        }

        .status {
            margin: 0;
            padding: 8px 12px;
            border-radius: 10px;
            border: 1px solid rgba(61, 126, 255, 0.22);
            background: linear-gradient(180deg, #ffffff 0%, #f6f9ff 100%);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.84);
            font-size: clamp(14px, 1.1vw, 18px);
            line-height: 1.3;
            color: #29406e;
        }

        .status .ok {
            color: var(--ok);
            margin: 0 2px;
        }

        .device-name {
            margin: 0;
            padding: 4px 12px;
            border: 1px solid rgba(61, 126, 255, 0.28);
            border-radius: 999px;
            background: rgba(61, 126, 255, 0.08);
            color: #3155a7;
            font-size: clamp(12px, 1vw, 14px);
            font-weight: 600;
            line-height: 1.3;
            white-space: nowrap;
        }

        .back-link {
            color: var(--accent);
            font-size: clamp(12px, 0.95vw, 14px);
            text-decoration: none;
            padding: 4px 10px;
            border-radius: 999px;
            border: 1px solid rgba(61, 126, 255, 0.24);
            background: var(--accent-soft);
        }

        .back-link:hover {
            border-color: rgba(61, 126, 255, 0.4);
        }

        .log-wrap {
            border: 1px solid rgba(61, 126, 255, 0.22);
            border-radius: 12px;
            background: linear-gradient(180deg, #f8fbff 0%, #f1f6ff 100%);
            flex: 1;
            min-height: 0;
            overflow: hidden;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.88);
        }

        .log-scroll {
            height: 100%;
            overflow: auto;
            padding: 8px 10px;
            scrollbar-width: thin;
            scrollbar-color: rgba(167, 190, 232, 0.55) transparent;
        }

        .log {
            margin: 0;
            color: var(--ok);
            font-family: "Cascadia Mono", "Consolas", "Courier New", monospace;
            font-size: clamp(12px, 0.92vw, 14px);
            line-height: 1.48;
            white-space: pre;
            min-width: max-content;
            text-shadow: 0 1px 0 rgba(0, 0, 0, 0.26);
        }

        .log-image-box {
            margin: 6px 0;
        }

        .log-image {
            display: block;
            max-width: min(100%, 640px);
            max-height: 420px;
            width: auto;
            height: auto;
        }

        .log.soft-wrap {
            white-space: pre-wrap;
            min-width: 0;
            word-break: break-word;
        }

        .option-bar {
            display: grid;
            gap: 10px;
            border: 1px solid var(--line);
            border-radius: 10px;
            background: linear-gradient(180deg, #ffffff 0%, #f7faff 100%);
            padding: 8px 10px;
        }

        .option-top-row {
            display: flex;
            align-items: center;
            gap: 14px;
            min-height: 24px;
        }

        .option-check {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--sub);
            font-size: 13px;
            user-select: none;
            white-space: nowrap;
        }

        .send-row {
            display: flex;
            align-items: center;
            gap: 8px;
            min-width: 0;
        }

        .quick-picker {
            position: relative;
            min-width: 170px;
        }

        .quick-toggle {
            width: 100%;
            border: 1px solid rgba(61, 126, 255, 0.24);
            border-radius: 8px;
            padding: 7px 8px;
            font-size: 13px;
            color: #243456;
            background: #fff;
            outline: none;
            text-align: left;
            cursor: pointer;
        }

        .quick-toggle::after {
            content: "▾";
            float: right;
            color: #6c83b1;
        }

        .quick-toggle:focus {
            border-color: rgba(61, 126, 255, 0.55);
            box-shadow: 0 0 0 2px rgba(61, 126, 255, 0.12);
        }

        .quick-menu {
            position: absolute;
            left: 0;
            right: 0;
            bottom: calc(100% + 6px);
            margin: 0;
            padding: 6px;
            list-style: none;
            border: 1px solid rgba(61, 126, 255, 0.28);
            border-radius: 8px;
            background: #fff;
            box-shadow: 0 8px 24px rgba(31, 56, 109, 0.18);
            max-height: 220px;
            overflow: auto;
            z-index: 20;
        }

        .quick-menu[hidden] {
            display: none;
        }

        .quick-option {
            border: 0;
            width: 100%;
            text-align: left;
            border-radius: 6px;
            padding: 7px 8px;
            background: transparent;
            color: #2b416c;
            font-size: 13px;
            cursor: pointer;
        }

        .quick-option:hover {
            background: rgba(61, 126, 255, 0.1);
        }

        .send-input {
            width: 100%;
            min-width: 0;
            border: 1px solid rgba(61, 126, 255, 0.24);
            border-radius: 8px;
            padding: 7px 9px;
            font-size: 13px;
            color: #243456;
            outline: none;
            background: #fff;
        }

        .send-input:focus {
            border-color: rgba(61, 126, 255, 0.55);
            box-shadow: 0 0 0 2px rgba(61, 126, 255, 0.12);
        }

        .send-btn {
            border: 1px solid rgba(61, 126, 255, 0.3);
            border-radius: 8px;
            background: var(--accent-soft);
            color: #3158b2;
            font-size: 13px;
            line-height: 1;
            padding: 8px 14px;
            cursor: pointer;
            white-space: nowrap;
        }

        .send-btn:hover {
            border-color: rgba(61, 126, 255, 0.45);
        }

        .log-scroll::-webkit-scrollbar {
            width: 10px;
            height: 10px;
        }

        .log-scroll::-webkit-scrollbar-track {
            background: transparent;
            border-radius: 999px;
        }

        .log-scroll::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, rgba(184, 203, 238, 0.72), rgba(143, 170, 216, 0.72));
            border-radius: 999px;
            border: 2px solid rgba(23, 37, 65, 0.24);
        }

        .log-scroll::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(180deg, rgba(204, 219, 245, 0.9), rgba(162, 186, 228, 0.9));
        }

        @media (max-width: 860px) {
            body {
                padding: 4px;
            }

            .shell {
                height: calc(100dvh - 8px);
                padding: 10px;
                gap: 8px;
            }

            .top-row {
                gap: 8px;
            }

            .title-wrap {
                flex-wrap: wrap;
                gap: 6px;
            }

            .status {
                font-size: 14px;
                padding: 7px 10px;
            }

            .log-scroll {
                padding: 8px;
            }

            .log {
                font-size: 12px;
                line-height: 1.36;
            }

            .option-bar {
                gap: 8px;
                padding: 8px;
            }

            .option-top-row {
                gap: 10px;
            }

            .send-row {
                min-width: 0;
            }

            .quick-picker {
                min-width: 128px;
            }
        }
    </style>
  </head>
  <body>
    <main class="shell">
      <header class="top-row">
        <div class="title-wrap">
          <p class="status"><span id="wsStateText">WebSocket 已连接</span><span class="ok">-></span><span id="wsPath">/api/websocket</span>
          </p>
          <p class="device-name">{{deviceName}}</p>
        </div>
        <a class="back-link" href="/">返回首页</a>
      </header>
      <section class="log-wrap" aria-label="WebSocket 日志输出">
        <div class="log-scroll" id="content-wrap">
          <div class="log" id="content"></div>
        </div>
      </section>
      <footer class="option-bar" aria-label="日志选项栏">
        <div class="option-top-row">
          <label class="option-check" for="softWrapToggle">
            <input type="checkbox" id="softWrapToggle"/>
            <span>软换行</span>
          </label>
          <label class="option-check" for="lockBottomToggle">
            <input type="checkbox" id="lockBottomToggle" checked/>
            <span>锁定滚动到底</span>
          </label>
        </div>
        <div class="send-row">
          <div class="quick-picker" id="quickPicker" hidden>
            <button class="quick-toggle" id="quickToggle" type="button" aria-haspopup="listbox" aria-expanded="false">快捷输入</button>
            <ul class="quick-menu" id="quickMenu" role="listbox" hidden></ul>
          </div>
          <input class="send-input" id="sendInput" type="text" placeholder="输入要发送给服务端的内容"/>
          <button class="send-btn" id="sendButton" type="button">发送</button>
        </div>
      </footer>
    </main>

    <script>
      const wsStateText = document.getElementById("wsStateText")
      const wsPath = document.getElementById("wsPath")
      const contentWrap = document.getElementById("content-wrap")
      const content = document.getElementById("content")
      const softWrapToggle = document.getElementById("softWrapToggle")
      const lockBottomToggle = document.getElementById("lockBottomToggle")
      const quickPicker = document.getElementById("quickPicker")
      const quickToggle = document.getElementById("quickToggle")
      const quickMenu = document.getElementById("quickMenu")
      const sendInput = document.getElementById("sendInput")
      const sendButton = document.getElementById("sendButton")
      const rawQuickOptions = '{{quickOptions}}'
      const host = window.location.host
      const rawPath = '{{webSocketPath}}'
      const path = rawPath && rawPath !== '{{webSocketPath}}' ? rawPath : "/api/websocket"
      const protocol = window.location.protocol === "https:" ? "wss://" : "ws://"
      const url = protocol + host + path

      wsPath.textContent = path
      appendContent("准备连接:" + url)

      const socket = new WebSocket(url)

      socket.onopen = function () {
        wsStateText.textContent = "WebSocket 已连接"
        appendContent("WebSocket 已连接->" + path)
      }

      socket.onmessage = async function (event) {
        await handleSocketMessage(event.data)
      }

      socket.onerror = function (event) {
        wsStateText.textContent = "WebSocket 连接异常"
        appendContent("发生错误:" + JSON.stringify(event))
      }

      socket.onclose = function () {
        wsStateText.textContent = "WebSocket 已关闭"
        appendContent("WebSocket 连接已关闭!")
      }

      softWrapToggle.addEventListener("change", function () {
        content.classList.toggle("soft-wrap", softWrapToggle.checked)
      })
      lockBottomToggle.addEventListener("change", function () {
        if (lockBottomToggle.checked) {
          scrollBottom()
        }
      })

      sendButton.addEventListener("click", sendMessageToServer)
      quickToggle.addEventListener("click", function () {
        const isOpen = !quickMenu.hidden
        quickMenu.hidden = isOpen
        quickToggle.setAttribute("aria-expanded", String(!isOpen))
      })
      quickMenu.addEventListener("click", function (event) {
        const target = event.target
        if (!(target instanceof HTMLButtonElement)) return
        const value = target.getAttribute("data-value") || ""
        const autoSend = target.getAttribute("data-autosend") === "true"
        if (value) {
          sendInput.value = value
          sendInput.focus()
          if (autoSend) {
            sendMessageToServer()
          }
        }
        quickMenu.hidden = true
        quickToggle.setAttribute("aria-expanded", "false")
      })
      document.addEventListener("click", function (event) {
        if (!quickPicker.contains(event.target)) {
          quickMenu.hidden = true
          quickToggle.setAttribute("aria-expanded", "false")
        }
      })
      sendInput.addEventListener("keydown", function (event) {
        if (event.key === "Enter") {
          sendMessageToServer()
        }
      })
      populateQuickSelect()

      async function handleSocketMessage(data) {
        if (data instanceof Blob) {
          const shouldScroll = shouldAutoScroll()
          if (data.type && data.type.startsWith("image/")) {
            const dataUrl = await blobToDataUrl(data)
            appendImageContent(dataUrl, shouldScroll)
            return
          }
          const text = await data.text()
          if (isImageDataUrl(text)) {
            appendImageContent(text.trim(), shouldScroll)
            return
          }
          appendContent(text || `收到 Blob 数据(${data.type || "unknown"}, ${data.size} bytes)`)
          return
        }
        appendContent(data)
      }

      function appendContent(text) {
        let row = String(text == null ? "" : text)
        const shouldScroll = shouldAutoScroll()
        if (isImageDataUrl(row)) {
          appendImageContent(row.trim(), shouldScroll)
          return
        }
        if (hasReg(row, /.*V->.*/g)) {
          row = wrapColor(row, "#9EC5BE")
        } else if (hasReg(row, /.*D->.*/g)) {
          row = wrapColor(row, "#42B00C")
        } else if (hasReg(row, /.*I->.*/g)) {
          row = wrapColor(row, "#32B07D")
        } else if (hasReg(row, /.*W->.*/g)) {
          row = wrapColor(row, "#8F6719")
        } else if (hasReg(row, /.*E->.*/g)) {
          row = wrapColor(row, "#F86967")
        } else if (hasReg(row, /.*A->.*/g)) {
          row = wrapColor(row, "#B42C1D")
        }

        row = tintColor(row, /\d+:\d+:\d+\.\d+/g, "#b40a0a")
        if (content.innerHTML) {
          content.innerHTML += "<br>" + row
        } else {
          content.innerHTML = row
        }
        if (shouldScroll) {
          scrollBottom()
        }
      }

      function appendImageContent(dataUrl, shouldScroll) {
        if (content.innerHTML) {
          content.insertAdjacentHTML("beforeend", "<br>")
        }
        const box = document.createElement("div")
        box.className = "log-image-box"
        const image = document.createElement("img")
        image.className = "log-image"
        image.src = dataUrl
        /*image.alt = "ws-image"*/
        image.alt = '{{deviceName}}'
        image.loading = "lazy"
        box.appendChild(image)
        content.appendChild(box)
        if (shouldScroll) {
          scrollBottom()
        }
      }

      function isImageDataUrl(text) {
        const value = String(text == null ? "" : text).trim()
        return value.startsWith("data:image/") && value.includes(";base64,")
      }

      function blobToDataUrl(blob) {
        return new Promise((resolve, reject) => {
          const reader = new FileReader()
          reader.onload = function () {
            resolve(String(reader.result || ""))
          }
          reader.onerror = function () {
            reject(reader.error || new Error("blob to dataUrl failed"))
          }
          reader.readAsDataURL(blob)
        })
      }

      function shouldAutoScroll() {
        return lockBottomToggle.checked || isScrollBottom()
      }

      function tintColor(text, reg, color) {
        return text.replace(reg, `<span style="color: ${color};">$&</span>`)
      }

      function wrapColor(text, color) {
        return `<span style="color: ${color};">${text}</span>`
      }

      function hasReg(text, reg) {
        reg.lastIndex = 0
        return reg.test(text)
      }

      function scrollBottom() {
        contentWrap.scrollTo({top: content.scrollHeight})
      }

      function isScrollBottom() {
        return contentWrap.scrollTop + contentWrap.clientHeight >= content.scrollHeight - 60
      }

      function sendMessageToServer() {
        const message = sendInput.value.trim()
        if (!message) {
          appendContent("发送失败: 内容为空")
          return
        }
        if (socket.readyState !== WebSocket.OPEN) {
          appendContent("发送失败: WebSocket 未连接")
          return
        }
        socket.send(message)
        appendContent("发送V->" + message)
        sendInput.value = ""
      }

      function populateQuickSelect() {
        const options = parseQuickOptions(rawQuickOptions)
        if (options.length === 0) {
          quickPicker.hidden = true
          return
        }
        quickPicker.hidden = false
        quickMenu.innerHTML = ""
        options.forEach((item) => {
          const li = document.createElement("li")
          const btn = document.createElement("button")
          btn.type = "button"
          btn.className = "quick-option"
          btn.setAttribute("role", "option")
          btn.setAttribute("data-value", item.value)
          btn.setAttribute("data-autosend", String(item.autoSend))
          btn.textContent = item.label
          li.appendChild(btn)
          quickMenu.appendChild(li)
        })
      }

      function parseQuickOptions(raw) {
        let parsed
        try {
          parsed = JSON.parse(raw)
        } catch (error) {
          appendContent("快捷输入解析失败: " + String(error))
          return []
        }
        if (!Array.isArray(parsed)) {
          appendContent("快捷输入格式错误: 需要 JSON 数组")
          return []
        }
        return parsed.map((item, index) => {
          if (!item || typeof item !== "object") {
            appendContent(`快捷输入第 ${index + 1} 项格式错误`)
            return null
          }
          const label = typeof item.label === "string" ? item.label.trim() : ""
          const value = typeof item.value === "string" ? item.value : String(item.value ?? "")
          const autoSend = item.autoSend === true || item.autoSend === "true" || item.autoSend === 1
          if (!label || !value) {
            appendContent(`快捷输入第 ${index + 1} 项缺少 label/value`)
            return null
          }
          return {label, value, autoSend}
        }).filter(Boolean)
      }
    </script>
  </body>
</html>
