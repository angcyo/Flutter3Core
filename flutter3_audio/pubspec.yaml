name: flutter3_audio
description: "A new Flutter audio package."
version: 0.0.1
homepage: https://github.com/angcyo/Flutter3Core
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

environment:
  sdk: ^3.11.1
  flutter: ">=1.17.0"

# https://dart.dev/tools/pub/workspaces/
# Support for pub workspaces was introduced in Dart 3.6.0.
resolution: workspace

dependencies:
  flutter:
    sdk: flutter

  flutter3_basics:
    path: ../flutter3_basics

  # https://pub.dev/packages/audio_decoder
  audio_decoder: ^0.7.4

  # https://pub.dev/packages/sonix
  # Sonix 使用 FFmpeg 进行音频解码。对于桌面平台，您必须在系统上安装 FFmpeg。移动平台则不需要单独安装 FFmpeg。
  #sonix: ^2.0.1

  # https://pub.dev/packages/flutter_pcm_sound
  # Android iOS macOS
  #flutter_pcm_sound: ^3.3.3

  # https://pub.dev/packages/dart_melty_soundfont
  #dart_melty_soundfont: ^2.0.0

  # https://pub.dev/packages/ffmpeg_kit_flutter_new
  # Android iOS macOS
  #ffmpeg_kit_flutter_new: ^4.1.0

  # https://pub.dev/packages/ffmpeg_kit_flutter_minimal
  # Android iOS macOS
  #ffmpeg_kit_flutter_minimal: ^6.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  # To add assets to your package, add an assets section, like this:
  # assets:
  #   - images/a_dot_burr.jpeg
  #   - images/a_dot_ham.jpeg
  #
  # For details regarding assets in packages, see
  # https://flutter.dev/to/asset-from-package
  #
  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # To add custom fonts to your package, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
