name: flutter3_http
description: flutter3 http package
version: 0.0.1
homepage: https://github.com/angcyo/Flutter3Core
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

environment:
  sdk: ^3.10.0

# https://dart.dev/tools/pub/workspaces/
# Support for pub workspaces was introduced in Dart 3.6.0.
resolution: workspace

dependencies:
  flutter:
    sdk: flutter
  flutter3_basics:
    path: ../flutter3_basics
  # https://pub.dev/packages/http
  # https://pub.dev/packages/async
  # https://pub.dev/packages/http_parser
  http: ^1.6.0
  # https://pub.dev/packages/dio
  # https://pub.dev/packages/async
  # https://pub.dev/packages/http_parser
  # https://pub.dev/packages/meta
  # https://pub.dev/packages/path
  dio: ^5.10.0
  # https://pub.dev/packages/dio_http2_adapter
  # https://pub.dev/packages/http2
  # https://pub.dev/packages/dio
  #dio_http2_adapter: ^2.3.2
  # https://pub.dev/packages/json_annotation
  # https://github.com/google/json_serializable.dart/tree/master/json_annotation
  # Because flutter3_http depends on json_annotation ^4.11.0 and json_serializable 6.11.2 depends on json_annotation >=4.9.0 <4.10.0, json_serializable 6.11.2 is forbidden.
  #And because flutter3_http depends on json_serializable ^6.11.2, json_serializable >6.11.2 <7.0.0 is required.
  #Because json_serializable >=6.11.3 depends on build ^4.0.3 and no versions of json_serializable match >6.11.2 <6.11.3, json_serializable >6.11.2 requires build ^4.0.3.
  json_annotation: ^4.12.0
  # https://pub.dev/packages/simple_sse_dio
  # https://pub.dev/packages/dio
  # https://pub.dev/packages/simple_sse
  simple_sse_dio: ^1.0.1
  # https://pub.dev/packages/simple_sse
  simple_sse: ^2.0.0

  # https://pub.dev/packages/doh
  doh: ^0.0.4+2

  # https://pub.dev/packages/xml
  xml: ^7.0.1

  # https://pub.dev/packages/json_rpc_2
  # https://www.jsonrpc.org/specification
  # https://pub.dev/packages/stack_trace
  # https://pub.dev/packages/stream_channel
  #json_rpc_2: ^4.1.0

  # https://pub.dev/packages/async
  # https://pub.dev/packages/collection
  # https://pub.dev/packages/meta
  async: ^2.13.1

  # https://pub.dev/packages/http2
  # 该库在双向字节流之上提供了一个 http/2 接口。
  #http2: ^2.3.1

  # https://pub.dev/packages/dio_http2_adapter
  # https://pub.dev/packages/dio
  # https://pub.dev/packages/http2
  # https://pub.dev/packages/meta
  #dio_http2_adapter: ^2.7.0

  # https://pub.dev/packages/rhttp
  # 使用 Rust 向 Flutter 开发者发送 HTTP 请求。
  # 这个包是用 Dart 语言封装的 reqwest crate，reqwest 是一个快速可靠的 Rust HTTP 客户端。
  # https://pub.dev/packages/flutter_rust_bridge
  # https://pub.dev/packages/freezed_annotation
  # https://pub.dev/packages/http
  # https://pub.dev/packages/http_profile
  #rhttp: ^0.16.0

  # https://pub.dev/packages/flutter_quic
  # 一个为移动和桌面应用程序提供 QUIC 协议支持的 Flutter 插件。
  # 基于 Quinn Rust 库，使用 flutter_rust_bridge 构建。
  # QUIC (Quick UDP Internet Connections) （快速 UDP 互联网连接）是 HTTP/3 的传输协议。
  # https://pub.dev/packages/flutter_rust_bridge
  # https://pub.dev/packages/freezed_annotation
  #flutter_quic: ^1.0.0

dependency_overrides:
  # Because flutter3_http depends on xml ^7.0.1 and flutter_gen_core 5.14.1 depends on xml ^6.0.0, flutter_gen_core 5.14.1 is forbidden.
  #And because flutter_gen 5.14.1 depends on flutter_gen_core 5.14.1, flutter_gen 5.14.1 is forbidden.
  #Because no versions of flutter_gen match >5.14.1 <6.0.0 and flutter3_basics depends on flutter_gen ^5.14.1, flutter_gen 5.14.1 is required.
  xml: ^7.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: any
  # https://pub.dev/packages/json_serializable
  # https://github.com/google/json_serializable.dart/tree/master/json_serializable
  # https://pub.dev/packages/analyzer
  # https://pub.dev/packages/async
  # https://pub.dev/packages/build
  # https://pub.dev/packages/build_config
  # https://pub.dev/packages/collection
  # https://pub.dev/packages/json_annotation
  # https://pub.dev/packages/meta
  # https://pub.dev/packages/path
  # https://pub.dev/packages/pub_semver
  # https://pub.dev/packages/pubspec_parse
  # https://pub.dev/packages/source_gen
  # https://pub.dev/packages/source_helper
  # Because flutter3_core depends on isar_generator ^3.1.0+1 and no versions of isar_generator match >3.1.0+1 <4.0.0, isar_generator 3.1.0+1 is required.
  #And because isar_generator 3.1.0+1 depends on source_gen ^1.2.2, source_gen ^1.2.2 is required.
  #So, because flutter3_http depends on json_serializable ^6.9.4 which depends on source_gen ^2.0.0, version solving failed.
  #...
  # source_gen: ^4.1.1 / isar_generator
  json_serializable: ^6.14.0

  # https://pub.dev/packages/googleapis
  # https://pub.dev/packages/_discoveryapis_commons
  # https://pub.dev/packages/http
  googleapis: ^16.0.0
  # https://pub.dev/packages/googleapis_auth
  # https://pub.dev/packages/crypto
  # https://pub.dev/packages/google_cloud
  # https://pub.dev/packages/google_identity_services_web
  # https://pub.dev/packages/http
  # https://pub.dev/packages/http_parser
  # https://pub.dev/packages/meta
  googleapis_auth: ^2.3.3

